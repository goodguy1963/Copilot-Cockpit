<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Copilot Cockpit workflow loop diagram</title>
  <desc id="desc">A generic workflow loop showing Company or Team Work flowing into Todos, with Tasks, Jobs, and Research as execution paths, MCP as an orchestration layer, and results looping back into Todos.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop class="bgStart" offset="0%"/>
      <stop class="bgEnd" offset="100%"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop class="panelStart" offset="0%"/>
      <stop class="panelEnd" offset="100%"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop class="accentStart" offset="0%"/>
      <stop class="accentEnd" offset="100%"/>
    </linearGradient>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="1">
      <stop class="signalStart" offset="0%"/>
      <stop class="signalEnd" offset="100%"/>
    </linearGradient>
    <linearGradient id="support" x1="0" y1="0" x2="1" y2="1">
      <stop class="supportStart" offset="0%"/>
      <stop class="supportEnd" offset="100%"/>
    </linearGradient>
    <linearGradient id="loop" x1="0" y1="0" x2="1" y2="1">
      <stop class="loopStart" offset="0%"/>
      <stop class="loopEnd" offset="100%"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1f2937" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path class="arrowHead" d="M 0 0 L 10 5 L 0 10 z"/>
    </marker>
    <style>
      :root {
        --bg-start: #f7f4ec;
        --bg-end: #eef2f7;
        --panel-start: #ffffff;
        --panel-end: #f7f8fb;
        --accent-start: #d9643a;
        --accent-end: #f0a24f;
        --signal-start: #1b5c79;
        --signal-end: #2f8c95;
        --support-start: #2d6c4f;
        --support-end: #5d9876;
        --loop-start: #5b6d8d;
        --loop-end: #8894ab;
        --panel-stroke: #dde3ec;
        --card-fill: #ffffff;
        --card-stroke: #d6dce6;
        --title: #142033;
        --subtitle: #516078;
        --section: #5a667d;
        --card-title: #122033;
        --card-body: #546176;
        --hero-title: #ffffff;
        --hero-body: #dceef1;
        --small-title: #ffffff;
        --small-body: #e4f3e8;
        --arrow: #445066;
        --arrow-soft: #7f8aa0;
        --arrow-loop: #66748b;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg-start: #0b1220;
          --bg-end: #172334;
          --panel-start: #0f1827;
          --panel-end: #182435;
          --accent-start: #b8502f;
          --accent-end: #d48d3f;
          --signal-start: #17455c;
          --signal-end: #236a77;
          --support-start: #214a37;
          --support-end: #427459;
          --loop-start: #495b78;
          --loop-end: #6a7892;
          --panel-stroke: #2c3748;
          --card-fill: #162132;
          --card-stroke: #334257;
          --title: #edf4ff;
          --subtitle: #a6b4c8;
          --section: #8ea0b7;
          --card-title: #f1f5fb;
          --card-body: #b3c0d1;
          --hero-title: #f8fbff;
          --hero-body: #d8e6ed;
          --small-title: #f7fbff;
          --small-body: #dbe9e0;
          --arrow: #8da1be;
          --arrow-soft: #7487a4;
          --arrow-loop: #8b9ab3;
        }
      }

      .bgStart { stop-color: var(--bg-start); }
      .bgEnd { stop-color: var(--bg-end); }
      .panelStart { stop-color: var(--panel-start); }
      .panelEnd { stop-color: var(--panel-end); }
      .accentStart { stop-color: var(--accent-start); }
      .accentEnd { stop-color: var(--accent-end); }
      .signalStart { stop-color: var(--signal-start); }
      .signalEnd { stop-color: var(--signal-end); }
      .supportStart { stop-color: var(--support-start); }
      .supportEnd { stop-color: var(--support-end); }
      .loopStart { stop-color: var(--loop-start); }
      .loopEnd { stop-color: var(--loop-end); }
      .arrowHead { fill: var(--arrow); }
      .panelStroke { stroke: var(--panel-stroke); }
      .cardPanel { fill: var(--card-fill); stroke: var(--card-stroke); }
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: var(--title); }
      .subtitle { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: var(--subtitle); }
      .section { font: 700 15px 'Segoe UI', Arial, sans-serif; letter-spacing: 0.08em; text-transform: uppercase; fill: var(--section); }
      .cardTitle { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: var(--card-title); text-anchor: middle; }
      .cardBody { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: var(--card-body); text-anchor: middle; }
      .heroTitle { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: var(--hero-title); text-anchor: middle; }
      .heroBody { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: var(--hero-body); text-anchor: middle; }
      .smallTitle { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: var(--small-title); text-anchor: middle; }
      .smallBody { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: var(--small-body); }
      .edge { stroke: var(--arrow); stroke-width: 3.5; fill: none; marker-end: url(#arrow); }
      .edgeSoft { stroke: var(--arrow-soft); stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .edgeLoop { stroke: var(--arrow-loop); stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .edgeBoth { stroke: var(--arrow); stroke-width: 3.5; fill: none; marker-start: url(#arrow); marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="820" rx="28" fill="url(#bg)"/>
  <rect class="panelStroke" x="34" y="34" width="1132" height="752" rx="28" fill="url(#panel)"/>

  <text x="72" y="94" class="title">Copilot Cockpit Workflow Loop</text>
  <text x="72" y="124" class="subtitle">A generic planning and execution loop for company work, team work, or agent-driven work.</text>

  <text x="78" y="172" class="section">Generic Flow</text>

  <g filter="url(#shadow)">
    <rect x="420" y="182" width="360" height="96" rx="28" fill="url(#signal)"/>
    <text x="600" y="236" class="heroTitle">Company or Team Work</text>
    <text x="600" y="262" class="heroBody">Requests, goals, operations, delivery</text>

    <rect x="414" y="330" width="372" height="116" rx="28" fill="url(#accent)"/>
    <text x="600" y="379" class="heroTitle">Todos</text>
    <text x="600" y="409" class="heroBody">Planning, communication, approval,</text>
    <text x="600" y="432" class="heroBody">handoff, and review hub</text>

    <rect class="cardPanel" x="450" y="494" width="300" height="126" rx="24"/>
    <text x="600" y="536" class="cardTitle">MCP</text>
    <text x="600" y="564" class="cardBody">Tool and orchestration</text>
    <text x="600" y="586" class="cardBody">layer between planning</text>
    <text x="600" y="608" class="cardBody">and execution</text>

    <rect class="cardPanel" x="112" y="640" width="240" height="96" rx="24"/>
    <text x="232" y="682" class="cardTitle">Tasks</text>
    <text x="232" y="710" class="cardBody">Concrete execution units</text>

    <rect class="cardPanel" x="480" y="640" width="240" height="96" rx="24"/>
    <text x="600" y="682" class="cardTitle">Jobs</text>
    <text x="600" y="710" class="cardBody">Multi-step workflows</text>

    <rect class="cardPanel" x="848" y="640" width="240" height="96" rx="24"/>
    <text x="968" y="682" class="cardTitle">Research</text>
    <text x="968" y="710" class="cardBody">Benchmark and improve</text>

    <rect x="380" y="744" width="440" height="42" rx="21" fill="url(#loop)"/>
    <text x="600" y="772" class="smallTitle">Results, review, iteration</text>
  </g>

  <path d="M 600 278 L 600 330" class="edgeBoth"/>
  <path d="M 600 446 L 600 494" class="edgeBoth"/>
  <path d="M 540 620 C 500 632, 390 638, 232 640" class="edge"/>
  <path d="M 600 620 L 600 640" class="edge"/>
  <path d="M 660 620 C 700 632, 810 638, 968 640" class="edge"/>
  <path d="M 232 736 C 314 746, 388 752, 470 758" class="edgeSoft"/>
  <path d="M 600 736 L 600 744" class="edgeSoft"/>
  <path d="M 968 736 C 886 746, 812 752, 730 758" class="edgeSoft"/>
  <path d="M 380 765 C 248 765, 160 660, 160 480 C 160 314, 296 284, 414 388" class="edgeLoop"/>
</svg>