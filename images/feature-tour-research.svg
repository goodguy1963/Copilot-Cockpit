<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title>Illustrative Research surface mockup</title>
  <desc>Illustrative SVG mockup of the Research tab showing benchmark-driven profile configuration, editable paths, bounded run limits, and an active run with score and attempt history.</desc>
  <defs>
    <linearGradient id="window-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22262b"/>
      <stop offset="100%" stop-color="#171a1f"/>
    </linearGradient>
    <linearGradient id="card-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2f36"/>
      <stop offset="100%" stop-color="#23272d"/>
    </linearGradient>
    <linearGradient id="panel-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#20242a"/>
      <stop offset="100%" stop-color="#1b1f24"/>
    </linearGradient>
    <linearGradient id="field-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b1f24"/>
      <stop offset="100%" stop-color="#171b20"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <style>
    .ui { font-family: "Segoe UI", Arial, sans-serif; }
    .title { fill: #f3f3f3; font-size: 28px; font-weight: 600; }
    .subtitle { fill: #b8bcc4; font-size: 14px; }
    .nav { fill: #d0d3d8; font-size: 18px; }
    .nav-muted { fill: #8a8f98; font-size: 18px; }
    .tiny { fill: #8f96a0; font-size: 12px; }
    .card-title { fill: #ffffff; font-size: 24px; font-weight: 600; }
    .card-copy { fill: #b7bbc2; font-size: 14px; }
    .section { fill: #f3f4f6; font-size: 19px; font-weight: 600; }
    .label { fill: #9aa0aa; font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
    .value { fill: #eef2f6; font-size: 16px; }
    .item-title { fill: #f4f6f8; font-size: 16px; font-weight: 600; }
    .meta { fill: #9aa0aa; font-size: 13px; }
    .copy { fill: #c9ced6; font-size: 13px; }
    .button-text { fill: #ffffff; font-size: 13px; font-weight: 600; }
  </style>

  <rect width="1600" height="980" fill="#0f1115"/>
  <g class="ui">
    <rect x="40" y="40" width="1520" height="900" rx="28" fill="url(#window-bg)" stroke="#343942" filter="url(#shadow)"/>
    <rect x="40" y="40" width="1520" height="48" rx="28" fill="#2b3038"/>
    <rect x="40" y="88" width="1520" height="852" fill="#1d1f23"/>
    <rect x="40" y="88" width="248" height="852" fill="#252526"/>

    <circle cx="74" cy="64" r="6" fill="#ea4c46"/>
    <circle cx="94" cy="64" r="6" fill="#f0b94b"/>
    <circle cx="114" cy="64" r="6" fill="#5cc95c"/>
    <text x="140" y="69" fill="#cfd2d7" font-size="17" font-weight="600">source-scheduler</text>
    <text x="1430" y="69" fill="#8f96a0" font-size="14">Research</text>

    <text x="72" y="132" class="tiny">Copilot Cockpit</text>
    <rect x="58" y="170" width="212" height="46" rx="12" fill="#2d3138"/>
    <text x="84" y="199" class="nav-muted">Todo Cockpit</text>
    <rect x="58" y="228" width="212" height="46" rx="12" fill="#2d3138"/>
    <text x="84" y="257" class="nav-muted">Tasks</text>
    <rect x="58" y="286" width="212" height="46" rx="12" fill="#2d3138"/>
    <text x="84" y="315" class="nav-muted">Jobs</text>
    <rect x="58" y="344" width="212" height="46" rx="12" fill="#0e639c" stroke="#1177bb"/>
    <rect x="58" y="344" width="5" height="46" rx="3" fill="#67b7ff"/>
    <text x="84" y="373" class="nav">Research</text>
    <rect x="58" y="402" width="212" height="46" rx="12" fill="#2d3138"/>
    <text x="84" y="431" class="nav-muted">Settings</text>
    <rect x="58" y="460" width="212" height="46" rx="12" fill="#2d3138"/>
    <text x="84" y="489" class="nav-muted">How To Use</text>

    <text x="332" y="138" class="tiny">Benchmark-driven iteration</text>
    <text x="332" y="176" class="title">Research</text>
    <text x="332" y="202" class="subtitle">Profiles define the benchmark command, metric extraction, bounds, editable paths, and agent or model choice before any iterative run begins.</text>

    <rect x="332" y="228" width="320" height="72" rx="18" fill="#173f34" stroke="#256050"/>
    <text x="360" y="258" fill="#d6f4e6" font-size="14" font-weight="600">Runs stay bounded by maximum iterations, total minutes, benchmark timeout, edit wait time, and failure limits.</text>
    <text x="360" y="282" fill="#b6decd" font-size="13">The score and changed paths remain visible before you decide whether the result should be kept.</text>

    <rect x="332" y="328" width="298" height="582" rx="22" fill="url(#card-bg)" stroke="#3a4048"/>
    <text x="362" y="374" class="card-title">Profiles and history</text>
    <text x="362" y="400" class="card-copy">Pick a profile, start a run, and compare scores before promoting any result into a task or job.</text>

    <rect x="362" y="428" width="112" height="30" rx="10" fill="#3a3d41"/>
    <text x="389" y="448" class="button-text">New profile</text>
    <rect x="486" y="428" width="114" height="30" rx="10" fill="#3a3d41"/>
    <text x="506" y="448" class="button-text">Load example</text>

    <text x="362" y="492" class="label">Profiles</text>
    <rect x="362" y="506" width="238" height="124" rx="18" fill="#0e639c"/>
    <text x="384" y="538" class="item-title">Onboarding Example Coverage Research</text>
    <text x="384" y="562" fill="#dbe7f5" font-size="13">Benchmark docs coverage before promoting work into execution.</text>
    <text x="384" y="592" fill="#dbe7f5" font-size="13">Best score: 92.4</text>
    <text x="384" y="614" fill="#dbe7f5" font-size="13">Attempts: 3 / 4</text>

    <rect x="362" y="646" width="238" height="76" rx="18" fill="url(#panel-bg)" stroke="#343942"/>
    <text x="384" y="676" class="item-title">Docs benchmark refresh</text>
    <text x="384" y="702" class="meta">Last score: 88.1 | completed yesterday</text>

    <text x="362" y="762" class="label">Run history</text>
    <rect x="362" y="776" width="238" height="112" rx="18" fill="url(#panel-bg)" stroke="#343942"/>
    <text x="384" y="806" class="item-title">Run 2026-04-27 09:42</text>
    <text x="384" y="830" class="meta">Score 92.4 | improved by 4.2</text>
    <text x="384" y="854" class="copy">Changed docs/feature-tour.md and images/feature-tour-research.svg</text>

    <rect x="656" y="328" width="868" height="582" rx="22" fill="url(#card-bg)" stroke="#3a4048"/>
    <text x="690" y="374" class="card-title">Research profile</text>
    <text x="690" y="400" class="card-copy">A research profile combines instructions, editable paths, a benchmark command, and hard run limits.</text>

    <text x="690" y="444" class="label">Name</text>
    <rect x="690" y="454" width="376" height="42" rx="13" fill="url(#field-bg)" stroke="#3b4149"/>
    <text x="712" y="481" class="value">Onboarding Example Coverage Research</text>

    <text x="1088" y="444" class="label">Benchmark command</text>
    <rect x="1088" y="454" width="404" height="42" rx="13" fill="url(#field-bg)" stroke="#3b4149"/>
    <text x="1110" y="481" class="value">npm run docs:coverage</text>

    <text x="690" y="528" class="label">Instructions</text>
    <rect x="690" y="538" width="802" height="96" rx="13" fill="url(#field-bg)" stroke="#3b4149"/>
    <text x="712" y="566" fill="#f2f4f7" font-size="15">Improve onboarding and feature-tour coverage with measured edits only.</text>
    <text x="712" y="592" fill="#d9dde3" font-size="15">Keep the work bounded to the approved doc and image paths, then compare the benchmark score before saving the result.</text>

    <text x="690" y="670" class="label">Editable paths</text>
    <rect x="690" y="680" width="802" height="74" rx="13" fill="url(#field-bg)" stroke="#3b4149"/>
    <text x="712" y="708" class="value">docs/feature-tour.md</text>
    <text x="712" y="734" class="value">images/feature-tour-*.svg</text>

    <text x="690" y="792" class="label">Metric pattern</text>
    <rect x="690" y="802" width="248" height="42" rx="13" fill="url(#field-bg)" stroke="#3b4149"/>
    <text x="712" y="829" class="value">Coverage:\s+([0-9.]+)%</text>

    <text x="958" y="792" class="label">Direction</text>
    <rect x="958" y="802" width="150" height="42" rx="13" fill="url(#field-bg)" stroke="#3b4149"/>
    <text x="980" y="829" class="value">maximize</text>

    <text x="1128" y="792" class="label">Max iterations</text>
    <rect x="1128" y="802" width="112" height="42" rx="13" fill="url(#field-bg)" stroke="#3b4149"/>
    <text x="1168" y="829" class="value">4</text>

    <text x="1260" y="792" class="label">Max minutes</text>
    <rect x="1260" y="802" width="112" height="42" rx="13" fill="url(#field-bg)" stroke="#3b4149"/>
    <text x="1300" y="829" class="value">20</text>

    <text x="1392" y="792" class="label">Failures</text>
    <rect x="1392" y="802" width="100" height="42" rx="13" fill="url(#field-bg)" stroke="#3b4149"/>
    <text x="1428" y="829" class="value">2</text>

    <rect x="690" y="860" width="496" height="120" rx="18" fill="url(#panel-bg)" stroke="#343942"/>
    <text x="714" y="890" class="section">Active run</text>
    <text x="714" y="918" class="label">Status</text>
    <text x="714" y="944" class="value">Running</text>
    <text x="860" y="918" class="label">Current best</text>
    <text x="860" y="944" class="value">92.4</text>
    <text x="1008" y="918" class="label">Attempts</text>
    <text x="1008" y="944" class="value">3 / 4</text>
    <text x="1120" y="918" class="label">Last outcome</text>
    <text x="1120" y="944" class="value">Improved benchmark</text>

    <rect x="1204" y="860" width="288" height="120" rx="18" fill="url(#panel-bg)" stroke="#343942"/>
    <text x="1228" y="890" class="section">Attempt timeline</text>
    <text x="1228" y="918" class="copy">Attempt 1 | 88.2 | baseline</text>
    <text x="1228" y="942" class="copy">Attempt 2 | 90.7 | refined instructions</text>
    <text x="1228" y="966" class="copy">Attempt 3 | 92.4 | narrowed editable paths</text>
  </g>
</svg>