<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">MCP setup</title>
  <desc id="desc">Illustrated MCP setup flow showing a prompt, merged mcp.json file, and scheduler server entry.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#18253a" />
      <stop offset="100%" stop-color="#2b3e5d" />
    </linearGradient>
  </defs>
  <rect width="1440" height="900" fill="url(#bg)" />
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="90" y="90" width="1260" height="720" rx="28" fill="#eef4fb" />
    <text x="130" y="150" font-size="34" font-weight="700" fill="#21324b">One-click workspace MCP setup</text>
    <text x="130" y="188" font-size="18" fill="#566c87">The extension prompts before it creates .vscode/mcp.json or merges the scheduler server into an existing file.</text>

    <rect x="130" y="240" width="440" height="250" rx="20" fill="#ffffff" stroke="#d0dbe8" />
    <text x="160" y="287" font-size="24" font-weight="700" fill="#21324b">Prompted setup</text>
    <text x="160" y="328" font-size="17" fill="#4f637b">This repo does not have the scheduler MCP entry yet.</text>
    <text x="160" y="356" font-size="17" fill="#4f637b">Add or merge it into .vscode/mcp.json now?</text>
    <rect x="160" y="402" width="160" height="42" rx="21" fill="#1b6fe5" />
    <text x="202" y="429" font-size="17" font-weight="700" fill="#ffffff">Set Up MCP</text>
    <rect x="338" y="402" width="116" height="42" rx="21" fill="#dfe8f2" />
    <text x="373" y="429" font-size="17" font-weight="700" fill="#314760">Cancel</text>

    <rect x="612" y="240" width="598" height="500" rx="20" fill="#0f1724" />
    <rect x="612" y="240" width="598" height="52" rx="20" fill="#182234" />
    <circle cx="650" cy="266" r="8" fill="#ff6b6b" />
    <circle cx="676" cy="266" r="8" fill="#ffd166" />
    <circle cx="702" cy="266" r="8" fill="#4ecdc4" />
    <text x="740" y="273" font-size="22" font-weight="700" fill="#dfe8f2">.vscode/mcp.json</text>

    <text x="650" y="330" font-size="22" font-family="Consolas, monospace" fill="#d9f3ff">{</text>
    <text x="690" y="370" font-size="22" font-family="Consolas, monospace" fill="#9cd3ff">"servers"</text>
    <text x="805" y="370" font-size="22" font-family="Consolas, monospace" fill="#d9f3ff">: {</text>
    <text x="732" y="418" font-size="22" font-family="Consolas, monospace" fill="#a9f0c5">"scheduler"</text>
    <text x="875" y="418" font-size="22" font-family="Consolas, monospace" fill="#d9f3ff">: {</text>
    <text x="774" y="458" font-size="20" font-family="Consolas, monospace" fill="#9cd3ff">"type"</text>
    <text x="872" y="458" font-size="20" font-family="Consolas, monospace" fill="#d9f3ff">:</text>
    <text x="902" y="458" font-size="20" font-family="Consolas, monospace" fill="#ffd7a8">"stdio"</text>
    <text x="774" y="494" font-size="20" font-family="Consolas, monospace" fill="#9cd3ff">"command"</text>
    <text x="915" y="494" font-size="20" font-family="Consolas, monospace" fill="#d9f3ff">:</text>
    <text x="945" y="494" font-size="20" font-family="Consolas, monospace" fill="#ffd7a8">"node"</text>
    <text x="774" y="530" font-size="20" font-family="Consolas, monospace" fill="#9cd3ff">"args"</text>
    <text x="864" y="530" font-size="20" font-family="Consolas, monospace" fill="#d9f3ff">:</text>
    <text x="894" y="530" font-size="20" font-family="Consolas, monospace" fill="#ffd7a8">[".../out/server.js"]</text>
    <text x="732" y="570" font-size="22" font-family="Consolas, monospace" fill="#d9f3ff">},</text>
    <text x="732" y="610" font-size="22" font-family="Consolas, monospace" fill="#a9f0c5">"otherServer"</text>
    <text x="900" y="610" font-size="22" font-family="Consolas, monospace" fill="#d9f3ff">: { ... }</text>
    <text x="690" y="652" font-size="22" font-family="Consolas, monospace" fill="#d9f3ff">}</text>
    <text x="650" y="692" font-size="22" font-family="Consolas, monospace" fill="#d9f3ff">}</text>

    <rect x="130" y="536" width="440" height="204" rx="20" fill="#ffffff" stroke="#d0dbe8" />
    <text x="160" y="580" font-size="24" font-weight="700" fill="#21324b">What the merge keeps</text>
    <text x="160" y="620" font-size="17" fill="#4f637b">- Existing MCP servers stay intact</text>
    <text x="160" y="650" font-size="17" fill="#4f637b">- Missing .vscode folder is created automatically</text>
    <text x="160" y="680" font-size="17" fill="#4f637b">- Invalid JSON is reported instead of overwritten</text>
    <text x="160" y="710" font-size="17" fill="#4f637b">- The generated server path follows the installed extension</text>
  </g>
</svg>