<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Jobs overview</title>
  <desc id="desc">Illustrated overview of the Copilot Scheduler Jobs tab with folders, workflow steps, labels, and pause controls.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#132033" />
      <stop offset="100%" stop-color="#24324a" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff" />
      <stop offset="100%" stop-color="#ebf1f7" />
    </linearGradient>
  </defs>
  <rect width="1440" height="900" fill="url(#bg)" />
  <rect x="70" y="60" width="1300" height="780" rx="26" fill="#0d1523" opacity="0.35" />
  <rect x="60" y="50" width="1300" height="780" rx="26" fill="url(#panel)" />
  <rect x="60" y="50" width="1300" height="56" rx="26" fill="#dbe5f0" />
  <circle cx="100" cy="78" r="8" fill="#ff6b6b" />
  <circle cx="126" cy="78" r="8" fill="#ffd166" />
  <circle cx="152" cy="78" r="8" fill="#4ecdc4" />
  <text x="200" y="84" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#21324b">Copilot Scheduler - How To + Jobs</text>

  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="100" y="138" width="1150" height="44" rx="12" fill="#edf3f9" stroke="#d1dbe7" />
    <rect x="118" y="145" width="120" height="30" rx="8" fill="#1b6fe5" />
    <text x="147" y="165" font-size="15" font-weight="700" fill="#ffffff">How To</text>
    <text x="268" y="165" font-size="15" fill="#40536c">Create</text>
    <text x="354" y="165" font-size="15" fill="#40536c">Task List</text>
    <text x="466" y="165" font-size="15" fill="#40536c">Jobs</text>

    <rect x="100" y="210" width="300" height="565" rx="18" fill="#f4f7fb" stroke="#d2dbe6" />
    <text x="126" y="245" font-size="24" font-weight="700" fill="#21324b">Folders</text>
    <rect x="126" y="270" width="248" height="54" rx="12" fill="#1b6fe5" />
    <text x="150" y="304" font-size="18" font-weight="700" fill="#ffffff">All jobs</text>
    <text x="338" y="304" font-size="15" fill="#d7e8ff">3</text>
    <rect x="126" y="340" width="248" height="72" rx="12" fill="#ffffff" stroke="#d8e1eb" />
    <text x="150" y="372" font-size="18" font-weight="700" fill="#21324b">Marketing</text>
    <text x="150" y="397" font-size="14" fill="#5f738d">2 jobs • email • weekly</text>
    <rect x="126" y="428" width="248" height="72" rx="12" fill="#ffffff" stroke="#d8e1eb" />
    <text x="150" y="460" font-size="18" font-weight="700" fill="#21324b">Launches</text>
    <text x="150" y="485" font-size="14" fill="#5f738d">1 job • active</text>
    <rect x="126" y="532" width="248" height="208" rx="12" fill="#ffffff" stroke="#d8e1eb" />
    <text x="150" y="566" font-size="20" font-weight="700" fill="#21324b">Jobs</text>
    <text x="150" y="598" font-size="17" fill="#21324b">Morning Content Pipeline</text>
    <text x="150" y="624" font-size="14" fill="#5f738d">0 9 * * 1-5 • 3 steps</text>
    <rect x="150" y="645" width="108" height="28" rx="14" fill="#d9f3e4" />
    <text x="179" y="664" font-size="13" font-weight="700" fill="#1f7a4d">Active</text>
    <text x="150" y="704" font-size="17" fill="#21324b">Weekly Report Refresh</text>
    <text x="150" y="730" font-size="14" fill="#5f738d">Paused • 2 steps</text>

    <rect x="430" y="210" width="780" height="565" rx="18" fill="#ffffff" stroke="#d2dbe6" />
    <text x="462" y="245" font-size="28" font-weight="700" fill="#21324b">Morning Content Pipeline</text>
    <text x="462" y="275" font-size="16" fill="#647a93">Job-owned schedule: 0 9 * * 1-5 • Folder: Marketing</text>
    <rect x="947" y="224" width="116" height="34" rx="17" fill="#ffd7a8" />
    <text x="978" y="246" font-size="14" font-weight="700" fill="#7a4b04">Pause Job</text>
    <rect x="1080" y="224" width="112" height="34" rx="17" fill="#dde7f2" />
    <text x="1104" y="246" font-size="14" font-weight="700" fill="#314760">Duplicate</text>

    <text x="462" y="332" font-size="20" font-weight="700" fill="#21324b">Workflow steps</text>
    <text x="462" y="358" font-size="14" fill="#647a93">Drag cards to reorder. Window times roll forward automatically.</text>

    <g>
      <rect x="462" y="390" width="220" height="234" rx="16" fill="#f7faff" stroke="#c6d7ee" />
      <text x="486" y="425" font-size="21" font-weight="700" fill="#21324b">1. Draft newsletter</text>
      <rect x="486" y="442" width="94" height="28" rx="14" fill="#d7ebff" />
      <text x="514" y="461" font-size="13" font-weight="700" fill="#1d63c6">45m window</text>
      <text x="486" y="495" font-size="14" fill="#5f738d">Next run: Today 09:00</text>
      <rect x="486" y="520" width="172" height="70" rx="12" fill="#eaf1f8" />
      <text x="500" y="548" font-size="14" fill="#314760">Use Skill.md to know how</text>
      <text x="500" y="569" font-size="14" fill="#314760">things must be done.</text>
      <rect x="486" y="603" width="88" height="28" rx="14" fill="#f0f4f8" />
      <text x="515" y="622" font-size="12" font-weight="700" fill="#314760">email</text>
    </g>

    <g>
      <rect x="710" y="390" width="220" height="234" rx="16" fill="#f7faff" stroke="#c6d7ee" />
      <text x="734" y="425" font-size="21" font-weight="700" fill="#21324b">2. QA and revise</text>
      <rect x="734" y="442" width="94" height="28" rx="14" fill="#d7ebff" />
      <text x="762" y="461" font-size="13" font-weight="700" fill="#1d63c6">30m window</text>
      <text x="734" y="495" font-size="14" fill="#5f738d">Next run: Today 09:45</text>
      <rect x="734" y="520" width="170" height="70" rx="12" fill="#eaf1f8" />
      <text x="748" y="548" font-size="14" fill="#314760">Specific agent and model</text>
      <text x="748" y="569" font-size="14" fill="#314760">are pinned per step.</text>
      <rect x="734" y="603" width="92" height="28" rx="14" fill="#f0f4f8" />
      <text x="762" y="622" font-size="12" font-weight="700" fill="#314760">review</text>
    </g>

    <g>
      <rect x="958" y="390" width="220" height="234" rx="16" fill="#f7faff" stroke="#c6d7ee" />
      <text x="982" y="425" font-size="21" font-weight="700" fill="#21324b">3. Publish update</text>
      <rect x="982" y="442" width="94" height="28" rx="14" fill="#d7ebff" />
      <text x="1010" y="461" font-size="13" font-weight="700" fill="#1d63c6">30m window</text>
      <text x="982" y="495" font-size="14" fill="#5f738d">Next run: Today 10:15</text>
      <rect x="982" y="520" width="168" height="70" rx="12" fill="#eaf1f8" />
      <text x="996" y="548" font-size="14" fill="#314760">Task labels + job labels</text>
      <text x="996" y="569" font-size="14" fill="#314760">stay filterable in the list.</text>
      <rect x="982" y="603" width="90" height="28" rx="14" fill="#f0f4f8" />
      <text x="1008" y="622" font-size="12" font-weight="700" fill="#314760">publish</text>
    </g>

    <line x1="682" y1="507" x2="710" y2="507" stroke="#8aa6c7" stroke-width="5" stroke-linecap="round" />
    <line x1="930" y1="507" x2="958" y2="507" stroke="#8aa6c7" stroke-width="5" stroke-linecap="round" />

    <rect x="462" y="662" width="716" height="88" rx="16" fill="#f7fafc" stroke="#d2dbe6" />
    <text x="486" y="696" font-size="20" font-weight="700" fill="#21324b">Add New Step</text>
    <text x="486" y="724" font-size="14" fill="#647a93">Create a step inline or attach a standalone task without leaving the Jobs tab.</text>
    <rect x="956" y="686" width="194" height="36" rx="18" fill="#1b6fe5" />
    <text x="998" y="710" font-size="15" font-weight="700" fill="#ffffff">Create Step</text>
  </g>
</svg>