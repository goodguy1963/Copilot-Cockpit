<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title>Illustrative GitHub Inbox mockup</title>
  <desc>Illustrative SVG mockup of the Todo Cockpit board top area showing the GitHub Inbox with Issues, Pull Requests, and Security Alerts lanes plus Create Todo actions.</desc>
  <defs>
    <linearGradient id="window-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22262b"/>
      <stop offset="100%" stop-color="#171a1f"/>
    </linearGradient>
    <linearGradient id="card-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2f36"/>
      <stop offset="100%" stop-color="#23272d"/>
    </linearGradient>
    <linearGradient id="lane-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#20242a"/>
      <stop offset="100%" stop-color="#1b1f24"/>
    </linearGradient>
    <linearGradient id="item-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#191d22"/>
      <stop offset="100%" stop-color="#15181d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <style>
    .ui { font-family: "Segoe UI", Arial, sans-serif; }
    .title { fill: #f3f3f3; font-size: 28px; font-weight: 600; }
    .subtitle { fill: #b8bcc4; font-size: 14px; }
    .nav { fill: #d0d3d8; font-size: 18px; }
    .nav-muted { fill: #8a8f98; font-size: 18px; }
    .card-title { fill: #ffffff; font-size: 25px; font-weight: 600; }
    .card-copy { fill: #b7bbc2; font-size: 15px; }
    .lane-title { fill: #ffffff; font-size: 20px; font-weight: 600; }
    .item-title { fill: #f4f6f8; font-size: 17px; font-weight: 600; }
    .meta { fill: #9aa0aa; font-size: 13px; }
    .copy { fill: #c9ced6; font-size: 14px; }
    .button-text { fill: #ffffff; font-size: 14px; font-weight: 600; }
    .status-label { fill: #9aa0aa; font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
    .status-value { fill: #f3f4f6; font-size: 17px; font-weight: 600; }
    .tiny { fill: #8f96a0; font-size: 12px; }
  </style>

  <rect width="1600" height="980" fill="#0f1115"/>
  <g class="ui">
    <rect x="40" y="40" width="1520" height="900" rx="28" fill="url(#window-bg)" stroke="#343942" filter="url(#shadow)"/>
    <rect x="40" y="40" width="1520" height="48" rx="28" fill="#2b3038"/>
    <rect x="40" y="88" width="1520" height="852" fill="#1d1f23"/>
    <rect x="40" y="88" width="248" height="852" fill="#252526"/>

    <circle cx="74" cy="64" r="6" fill="#ea4c46"/>
    <circle cx="94" cy="64" r="6" fill="#f0b94b"/>
    <circle cx="114" cy="64" r="6" fill="#5cc95c"/>
    <text x="140" y="69" fill="#cfd2d7" font-size="17" font-weight="600">source-scheduler</text>
    <text x="1365" y="69" fill="#8f96a0" font-size="14">Todo Cockpit</text>

    <text x="72" y="132" class="tiny">Copilot Cockpit</text>
    <rect x="58" y="170" width="212" height="46" rx="12" fill="#0e639c" stroke="#1177bb"/>
    <rect x="58" y="170" width="5" height="46" rx="3" fill="#67b7ff"/>
    <text x="84" y="199" class="nav">Todo Cockpit</text>
    <rect x="58" y="228" width="212" height="46" rx="12" fill="#2d3138"/>
    <text x="84" y="257" class="nav-muted">Tasks</text>
    <rect x="58" y="286" width="212" height="46" rx="12" fill="#2d3138"/>
    <text x="84" y="315" class="nav-muted">Jobs</text>
    <rect x="58" y="344" width="212" height="46" rx="12" fill="#2d3138"/>
    <text x="84" y="373" class="nav-muted">Research</text>
    <rect x="58" y="402" width="212" height="46" rx="12" fill="#2d3138"/>
    <text x="84" y="431" class="nav-muted">Settings</text>

    <text x="332" y="138" class="tiny">Planning and approval hub</text>
    <text x="332" y="176" class="title">Todo Cockpit</text>
    <text x="332" y="202" class="subtitle">Cached GitHub triage sits above the board so you can pull items into Todo review without leaving the cockpit.</text>

    <rect x="332" y="228" width="116" height="34" rx="10" fill="#2c3138"/>
    <text x="360" y="250" fill="#d6d9de" font-size="14" font-weight="600">Refresh</text>
    <rect x="462" y="228" width="124" height="34" rx="10" fill="#2c3138"/>
    <text x="489" y="250" fill="#d6d9de" font-size="14" font-weight="600">Filter labels</text>
    <rect x="1388" y="228" width="136" height="34" rx="10" fill="#0e639c"/>
    <text x="1421" y="250" fill="#ffffff" font-size="14" font-weight="700">New Todo</text>

    <rect x="332" y="288" width="1192" height="482" rx="22" fill="url(#card-bg)" stroke="#3a4048"/>
    <text x="392" y="342" class="card-title">GitHub Inbox</text>
    <text x="392" y="370" class="card-copy">Cached GitHub items for octocat/hello-world stay visible until you manually refresh the inbox.</text>
    <text x="392" y="390" class="card-copy">Create Todo keeps triage local. Create Todo + Review immediately enters needs-bot-review.</text>

    <rect x="1188" y="318" width="170" height="38" rx="11" fill="#3a3d41"/>
    <text x="1212" y="342" class="button-text">Refresh GitHub Inbox</text>
    <rect x="1372" y="318" width="108" height="38" rx="11" fill="#3a3d41"/>
    <text x="1403" y="342" class="button-text">Collapse</text>

    <g transform="translate(392 420)">
      <rect x="0" y="0" width="112" height="76" rx="14" fill="#1c2026" stroke="#343942"/>
      <text x="16" y="24" class="status-label">Status</text>
      <rect x="16" y="36" width="62" height="22" rx="11" fill="#1f5a46"/>
      <text x="31" y="51" fill="#d6f4e6" font-size="13" font-weight="700">Ready</text>

      <rect x="124" y="0" width="112" height="76" rx="14" fill="#1c2026" stroke="#343942"/>
      <text x="140" y="24" class="status-label">Issues</text>
      <text x="140" y="52" class="status-value">7</text>

      <rect x="248" y="0" width="136" height="76" rx="14" fill="#1c2026" stroke="#343942"/>
      <text x="264" y="24" class="status-label">Pull Requests</text>
      <text x="264" y="52" class="status-value">3</text>

      <rect x="396" y="0" width="138" height="76" rx="14" fill="#1c2026" stroke="#343942"/>
      <text x="412" y="24" class="status-label">Security Alerts</text>
      <text x="412" y="52" class="status-value">2</text>

      <rect x="546" y="0" width="180" height="76" rx="14" fill="#1c2026" stroke="#343942"/>
      <text x="562" y="24" class="status-label">Last sync</text>
      <text x="562" y="52" class="status-value">2026-04-27 09:42</text>
    </g>

    <rect x="392" y="522" width="350" height="210" rx="18" fill="url(#lane-bg)" stroke="#343942"/>
    <text x="418" y="560" class="lane-title">Issues</text>
    <text x="700" y="560" class="meta">7</text>
    <rect x="418" y="582" width="298" height="132" rx="16" fill="url(#item-bg)" stroke="#30353d"/>
    <text x="438" y="612" class="item-title">Scheduler defaults do not reload after sync</text>
    <text x="438" y="636" class="meta">#184 | open | 7m ago</text>
    <text x="438" y="664" class="copy">Follow-up after manual inbox triage. Reuses repo-local cached metadata</text>
    <text x="438" y="684" class="copy">so the board can update the same Todo instead of duplicating it.</text>
    <rect x="438" y="694" width="110" height="28" rx="10" fill="#3a3d41"/>
    <text x="464" y="713" class="button-text">Create Todo</text>
    <rect x="558" y="694" width="146" height="28" rx="10" fill="#3a3d41"/>
    <text x="578" y="713" class="button-text">Create Todo + Review</text>

    <rect x="754" y="522" width="350" height="210" rx="18" fill="url(#lane-bg)" stroke="#343942"/>
    <text x="780" y="560" class="lane-title">Pull Requests</text>
    <text x="1062" y="560" class="meta">3</text>
    <rect x="780" y="582" width="298" height="132" rx="16" fill="url(#item-bg)" stroke="#30353d"/>
    <text x="800" y="612" class="item-title">Add GitHub inbox cache guardrails</text>
    <text x="800" y="636" class="meta">#212 | open | feature/github-inbox -&gt; main | 11m ago</text>
    <text x="800" y="664" class="copy">Review-oriented imports can carry PR branch refs into the later</text>
    <text x="800" y="684" class="copy">automation prompt before implementation work starts.</text>
    <rect x="800" y="694" width="110" height="28" rx="10" fill="#3a3d41"/>
    <text x="826" y="713" class="button-text">Create Todo</text>
    <rect x="920" y="694" width="146" height="28" rx="10" fill="#3a3d41"/>
    <text x="940" y="713" class="button-text">Create Todo + Review</text>

    <rect x="1116" y="522" width="364" height="210" rx="18" fill="url(#lane-bg)" stroke="#343942"/>
    <text x="1142" y="560" class="lane-title">Security Alerts</text>
    <text x="1438" y="560" class="meta">2</text>
    <rect x="1142" y="582" width="312" height="62" rx="16" fill="url(#item-bg)" stroke="#30353d"/>
    <text x="1162" y="610" class="item-title">CodeQL alert in scheduler refresh path</text>
    <text x="1162" y="630" class="meta">Code Scanning | open | high | 3m ago</text>
    <rect x="1142" y="652" width="312" height="62" rx="16" fill="url(#item-bg)" stroke="#30353d"/>
    <text x="1162" y="680" class="item-title">Dependabot alert: minimatch</text>
    <text x="1162" y="700" class="meta">Dependabot | open | critical | 1h ago</text>
    <rect x="1162" y="718" width="110" height="28" rx="10" fill="#3a3d41"/>
    <text x="1188" y="737" class="button-text">Create Todo</text>
    <rect x="1282" y="718" width="146" height="28" rx="10" fill="#3a3d41"/>
    <text x="1302" y="737" class="button-text">Create Todo + Review</text>

    <g opacity="0.42">
      <rect x="332" y="794" width="378" height="120" rx="18" fill="#20242a" stroke="#343942"/>
      <text x="360" y="830" fill="#9aa0aa" font-size="17" font-weight="600">new</text>
      <rect x="360" y="850" width="320" height="34" rx="12" fill="#171b20"/>
      <text x="380" y="872" class="meta">Imported Todo cards continue into the main board workflow.</text>

      <rect x="738" y="794" width="378" height="120" rx="18" fill="#20242a" stroke="#343942"/>
      <text x="766" y="830" fill="#9aa0aa" font-size="17" font-weight="600">needs-bot-review</text>
      <rect x="766" y="850" width="320" height="34" rx="12" fill="#171b20"/>
      <text x="786" y="872" class="meta">Create Todo + Review can enter review immediately.</text>

      <rect x="1144" y="794" width="380" height="120" rx="18" fill="#20242a" stroke="#343942"/>
      <text x="1172" y="830" fill="#9aa0aa" font-size="17" font-weight="600">ready</text>
      <rect x="1172" y="850" width="322" height="34" rx="12" fill="#171b20"/>
      <text x="1192" y="872" class="meta">Approved work can inherit GitHub context in task drafts.</text>
    </g>
  </g>
</svg>