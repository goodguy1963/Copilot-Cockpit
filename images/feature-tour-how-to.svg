<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title>Illustrative How To Use tab mockup</title>
  <desc>Illustrative SVG mockup of the How To Use tab showing the operating model, orientation sections for Todo, Tasks, Jobs, and Research, plus file storage and overdue-task guidance.</desc>
  <defs>
    <linearGradient id="window-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22262b"/>
      <stop offset="100%" stop-color="#171a1f"/>
    </linearGradient>
    <linearGradient id="card-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2f36"/>
      <stop offset="100%" stop-color="#23272d"/>
    </linearGradient>
    <linearGradient id="panel-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#20242a"/>
      <stop offset="100%" stop-color="#1b1f24"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <style>
    .ui { font-family: "Segoe UI", Arial, sans-serif; }
    .title { fill: #f3f3f3; font-size: 28px; font-weight: 600; }
    .subtitle { fill: #b8bcc4; font-size: 14px; }
    .nav { fill: #d0d3d8; font-size: 18px; }
    .nav-muted { fill: #8a8f98; font-size: 18px; }
    .tiny { fill: #8f96a0; font-size: 12px; }
    .card-title { fill: #ffffff; font-size: 24px; font-weight: 600; }
    .card-copy { fill: #b7bbc2; font-size: 14px; }
    .section { fill: #f3f4f6; font-size: 18px; font-weight: 600; }
    .label { fill: #9aa0aa; font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
    .value { fill: #eef2f6; font-size: 15px; }
    .copy { fill: #c9ced6; font-size: 13px; }
    .button-text { fill: #ffffff; font-size: 13px; font-weight: 600; }
  </style>

  <rect width="1600" height="980" fill="#0f1115"/>
  <g class="ui">
    <rect x="40" y="40" width="1520" height="900" rx="28" fill="url(#window-bg)" stroke="#343942" filter="url(#shadow)"/>
    <rect x="40" y="40" width="1520" height="48" rx="28" fill="#2b3038"/>
    <rect x="40" y="88" width="1520" height="852" fill="#1d1f23"/>
    <rect x="40" y="88" width="248" height="852" fill="#252526"/>

    <circle cx="74" cy="64" r="6" fill="#ea4c46"/>
    <circle cx="94" cy="64" r="6" fill="#f0b94b"/>
    <circle cx="114" cy="64" r="6" fill="#5cc95c"/>
    <text x="140" y="69" fill="#cfd2d7" font-size="17" font-weight="600">source-scheduler</text>
    <text x="1406" y="69" fill="#8f96a0" font-size="14">How To Use</text>

    <text x="72" y="132" class="tiny">Copilot Cockpit</text>
    <rect x="58" y="170" width="212" height="46" rx="12" fill="#2d3138"/>
    <text x="84" y="199" class="nav-muted">Todo Cockpit</text>
    <rect x="58" y="228" width="212" height="46" rx="12" fill="#2d3138"/>
    <text x="84" y="257" class="nav-muted">Tasks</text>
    <rect x="58" y="286" width="212" height="46" rx="12" fill="#2d3138"/>
    <text x="84" y="315" class="nav-muted">Jobs</text>
    <rect x="58" y="344" width="212" height="46" rx="12" fill="#2d3138"/>
    <text x="84" y="373" class="nav-muted">Research</text>
    <rect x="58" y="402" width="212" height="46" rx="12" fill="#2d3138"/>
    <text x="84" y="431" class="nav-muted">Settings</text>
    <rect x="58" y="460" width="212" height="46" rx="12" fill="#0e639c" stroke="#1177bb"/>
    <rect x="58" y="460" width="5" height="46" rx="3" fill="#67b7ff"/>
    <text x="84" y="489" class="nav">How To Use</text>

    <text x="332" y="138" class="tiny">Built-in orientation</text>
    <text x="332" y="176" class="title">How To Use</text>
    <text x="332" y="202" class="subtitle">Start with the operating model: plan in Todo Cockpit, use Research when context is missing, then promote approved work into a Task or Job.</text>

    <rect x="332" y="228" width="1192" height="110" rx="22" fill="#173f34" stroke="#256050"/>
    <text x="362" y="260" fill="#d6f4e6" font-size="14" font-weight="600">Operating model</text>
    <text x="362" y="288" fill="#f2fff8" font-size="18" font-weight="600">Todo Cockpit</text>
    <text x="520" y="288" fill="#b6decd" font-size="18">-&gt;</text>
    <text x="560" y="288" fill="#f2fff8" font-size="18" font-weight="600">Research when context is missing</text>
    <text x="860" y="288" fill="#b6decd" font-size="18">-&gt;</text>
    <text x="900" y="288" fill="#f2fff8" font-size="18" font-weight="600">Task or Job</text>
    <text x="1040" y="288" fill="#b6decd" font-size="18">-&gt;</text>
    <text x="1080" y="288" fill="#f2fff8" font-size="18" font-weight="600">Review before more autonomy</text>
    <text x="362" y="314" fill="#b6decd" font-size="13">The orientation tab keeps the workflow stack, storage rules, and overdue-task behavior visible before you schedule anything.</text>

    <rect x="332" y="364" width="276" height="124" rx="20" fill="url(#card-bg)" stroke="#3a4048"/>
    <text x="360" y="398" class="section">Language and orientation</text>
    <text x="360" y="426" class="copy">Choose the cockpit language, then use the tab shortcuts to jump into the surface you need.</text>
    <rect x="360" y="442" width="140" height="30" rx="10" fill="#3a3d41"/>
    <text x="404" y="462" class="button-text">Switch to Settings</text>

    <rect x="624" y="364" width="276" height="124" rx="20" fill="url(#card-bg)" stroke="#3a4048"/>
    <text x="652" y="398" class="section">1. Todo - Planning and triage</text>
    <text x="652" y="426" class="copy">Todo stays separate from execution. Use comments, labels, and workflow flags such as ready or needs-bot-review.</text>
    <rect x="652" y="442" width="150" height="30" rx="10" fill="#3a3d41"/>
    <text x="694" y="462" class="button-text">Switch to Todo Board</text>

    <rect x="916" y="364" width="292" height="124" rx="20" fill="url(#card-bg)" stroke="#3a4048"/>
    <text x="944" y="398" class="section">2. Task - One executable unit</text>
    <text x="944" y="426" class="copy">Name the task, choose recurring or one-time execution, set scope, and leave agent or model blank to keep workspace defaults.</text>
    <rect x="944" y="442" width="154" height="30" rx="10" fill="#3a3d41"/>
    <text x="986" y="462" class="button-text">Switch to Create Task</text>

    <rect x="1224" y="364" width="300" height="124" rx="20" fill="url(#card-bg)" stroke="#3a4048"/>
    <text x="1252" y="398" class="section">3. Promote and manage Tasks</text>
    <text x="1252" y="426" class="copy">Task List separates recurring work, one-time runs, and Todo drafts so you can see what is already scheduled.</text>
    <rect x="1252" y="442" width="146" height="30" rx="10" fill="#3a3d41"/>
    <text x="1294" y="462" class="button-text">Switch to Task List</text>

    <rect x="332" y="514" width="376" height="150" rx="20" fill="url(#card-bg)" stroke="#3a4048"/>
    <text x="360" y="548" class="section">4. Jobs - Orchestrated runs</text>
    <text x="360" y="576" class="copy">Build multi-step workflows, insert pause checkpoints that wait for approval, compile a reviewed chain into one task, and keep workflows organized in folders.</text>
    <rect x="360" y="610" width="122" height="30" rx="10" fill="#3a3d41"/>
    <text x="398" y="630" class="button-text">Switch to Jobs</text>

    <rect x="724" y="514" width="376" height="150" rx="20" fill="url(#card-bg)" stroke="#3a4048"/>
    <text x="752" y="548" class="section">5. Research - Exploratory context</text>
    <text x="752" y="576" class="copy">Create a profile with instructions, editable paths, a benchmark command, and score extraction, then inspect the history before accepting a run.</text>
    <rect x="752" y="610" width="136" height="30" rx="10" fill="#3a3d41"/>
    <text x="790" y="630" class="button-text">Switch to Research</text>

    <rect x="1116" y="514" width="408" height="150" rx="20" fill="url(#card-bg)" stroke="#3a4048"/>
    <text x="1144" y="548" class="section">6. Where files are saved</text>
    <text x="1144" y="578" class="copy">Tasks live in .vscode/scheduler.json. Todo Cockpit stays in .vscode/scheduler.private.json. Prompt backups and scheduler history stay repo-local too.</text>

    <rect x="332" y="690" width="568" height="170" rx="20" fill="url(#card-bg)" stroke="#3a4048"/>
    <text x="360" y="724" class="section">7. Handling overdue Tasks</text>
    <text x="360" y="754" class="copy">If VS Code was closed while tasks were scheduled, the extension asks what to do with each overdue task instead of running them automatically on restart.</text>
    <text x="360" y="786" class="copy">Recurring: run now or skip to the next cycle. One-time: run now or reschedule by minutes.</text>

    <rect x="920" y="690" width="604" height="170" rx="20" fill="url(#card-bg)" stroke="#3a4048"/>
    <text x="948" y="724" class="section">Why this tab matters</text>
    <text x="948" y="754" class="copy">The help tab makes the extension easier to approach because it explains the planning-versus-execution model before you touch the controls.</text>
    <text x="948" y="786" class="copy">That keeps the first run honest: start with visible workflow rules, then move into tasks, jobs, or research with bounded expectations.</text>
  </g>
</svg>