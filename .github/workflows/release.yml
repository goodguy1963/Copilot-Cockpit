name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Cache VS Code test runtime
        uses: actions/cache@v5
        with:
          path: .vscode-test
          key: vscode-test-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            vscode-test-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build and typecheck
        run: npm run pretest

      - name: Ensure Xvfb is available
        shell: bash
        run: |
          if ! command -v xvfb-run >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y xvfb
          fi

      - name: Run tests
        shell: bash
        run: xvfb-run -a --server-args="-screen 0 1280x1024x24" npm test

      # vsce package auto-calls vscode:prepublish (esbuild minify) before packing
      - name: Build & package VSIX
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}" npm run package:vsix
          else
            npm run package:vsix
          fi

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v6
        with:
          name: copilot-cockpit-vsix
          path: archive/vsix/latest/copilot-cockpit-*.vsix

      # Publish to Visual Studio Marketplace on version tags only
      - name: Publish to VS Code Marketplace
        if: github.ref_type == 'tag'
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --pat "$VSCE_TOKEN" --packagePath archive/vsix/latest/copilot-cockpit-*.vsix

      # Publish to Open VSX Registry on version tags only
      - name: Publish to Open VSX Registry
        if: github.ref_type == 'tag'
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_PAT }}
        shell: bash
        run: |
          set +e
          OVSX_OUTPUT="$(npx ovsx publish archive/vsix/latest/copilot-cockpit-*.vsix -p "$OVSX_TOKEN" 2>&1)"
          OVSX_STATUS=$?
          printf '%s\n' "$OVSX_OUTPUT"

          if [[ $OVSX_STATUS -eq 0 ]]; then
            exit 0
          fi

          if grep -qi "Registry is in read-only mode" <<<"$OVSX_OUTPUT"; then
            echo "::warning::Open VSX is in read-only mode; continuing so GitHub release creation is not blocked."
            exit 0
          fi

          exit $OVSX_STATUS

      # Generate release notes from CHANGELOG.md when present, otherwise write fallback notes
      - name: Generate release metadata
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
            echo "RELEASE_TITLE=Copilot Cockpit ${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
            echo "RELEASE_PRERELEASE=false" >> "$GITHUB_ENV"
            node ./scripts/release-notes.js CHANGELOG.md release-notes.md
          else
            PACKAGE_VERSION="$(node -p "require('./package.json').version")"
            echo "RELEASE_TAG=edge" >> "$GITHUB_ENV"
            echo "RELEASE_TITLE=Copilot Cockpit edge" >> "$GITHUB_ENV"
            echo "RELEASE_PRERELEASE=true" >> "$GITHUB_ENV"
            {
              echo "Automated prerelease from main."
              echo
              echo "- Commit: ${GITHUB_SHA}"
              echo "- Source ref: ${GITHUB_REF_NAME}"
              echo "- Trigger: push"
              echo "- Packaged from workspace version: ${PACKAGE_VERSION}"
            } > release-notes.md
          fi

      - name: Create or update GitHub Release with VSIX
        uses: actions/github-script@v8
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          RELEASE_TITLE: ${{ env.RELEASE_TITLE }}
          RELEASE_PRERELEASE: ${{ env.RELEASE_PRERELEASE }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require("node:fs");
            const path = require("node:path");

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const releaseTag = process.env.RELEASE_TAG;
            const releaseTitle = process.env.RELEASE_TITLE;
            const prerelease = process.env.RELEASE_PRERELEASE === "true";
            const workspaceRoot = process.env.GITHUB_WORKSPACE;
            const latestDir = path.join(workspaceRoot, "archive", "vsix", "latest");
            const notesPath = path.join(workspaceRoot, "release-notes.md");
            const vsixName = fs
              .readdirSync(latestDir)
              .find((entry) => /^copilot-cockpit-.*\.vsix$/i.test(entry));

            if (!vsixName) {
              core.setFailed(`No VSIX found in ${latestDir}.`);
              return;
            }

            const assetPath = path.join(latestDir, vsixName);
            const releaseBody = fs.readFileSync(notesPath, "utf8");
            const assetData = fs.readFileSync(assetPath);

            let release;
            try {
              release = (
                await github.rest.repos.getReleaseByTag({
                  owner,
                  repo,
                  tag: releaseTag,
                })
              ).data;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            if (release) {
              release = (
                await github.rest.repos.updateRelease({
                  owner,
                  repo,
                  release_id: release.id,
                  name: releaseTitle,
                  body: releaseBody,
                  prerelease,
                  make_latest: prerelease ? "false" : "true",
                })
              ).data;

              const existingAsset = release.assets.find((asset) => asset.name === vsixName);
              if (existingAsset) {
                await github.rest.repos.deleteReleaseAsset({
                  owner,
                  repo,
                  asset_id: existingAsset.id,
                });
              }
            } else {
              release = (
                await github.rest.repos.createRelease({
                  owner,
                  repo,
                  tag_name: releaseTag,
                  name: releaseTitle,
                  body: releaseBody,
                  prerelease,
                  make_latest: prerelease ? "false" : "true",
                })
              ).data;
            }

            await github.rest.repos.uploadReleaseAsset({
              owner,
              repo,
              release_id: release.id,
              name: vsixName,
              data: assetData,
              headers: {
                "content-type": "application/octet-stream",
                "content-length": assetData.length,
              },
            });
